name: Deploy Globe SVG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy globe to dist
        run: |
          mkdir -p dist
          cp globe.svg dist/globe.svg

      - name: Push to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
