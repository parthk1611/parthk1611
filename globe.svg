<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="globeGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="60%" stop-color="#0d1b35"/>
      <stop offset="100%" stop-color="#050d1a"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadowGrad" cx="60%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="200" cy="200" r="155"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .spin { animation: spin 18s linear infinite; transform-origin: 200px 200px; }
    .spin-slow { animation: spin 32s linear infinite; transform-origin: 200px 200px; }
    .spin-rev { animation: spin-reverse 24s linear infinite; transform-origin: 200px 200px; }
    .pulse { animation: pulse 2.5s ease-in-out infinite; }
    .pulse2 { animation: pulse 2.5s ease-in-out infinite 0.8s; }
    .pulse3 { animation: pulse 2.5s ease-in-out infinite 1.6s; }
    .float { animation: float 6s ease-in-out infinite; }
    .orbit1 { animation: orbit1 8s linear infinite; transform-origin: 200px 200px; }
    .orbit2 { animation: orbit2 12s linear infinite; transform-origin: 200px 200px; }
    .twinkle { animation: twinkle 3s ease-in-out infinite; }
    .twinkle2 { animation: twinkle 3s ease-in-out infinite 1s; }
    .twinkle3 { animation: twinkle 3s ease-in-out infinite 2s; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; r: 4; }
      50% { opacity: 1; r: 7; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes orbit1 {
      from { transform: rotate(0deg) translateX(175px) rotate(0deg); }
      to { transform: rotate(360deg) translateX(175px) rotate(-360deg); }
    }
    @keyframes orbit2 {
      from { transform: rotate(180deg) translateX(190px) rotate(-180deg); }
      to { transform: rotate(540deg) translateX(190px) rotate(-540deg); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Background stars -->
  <rect width="400" height="400" fill="#050d1a"/>
  <circle cx="30" cy="40" r="1" fill="white" class="twinkle"/>
  <circle cx="70" cy="20" r="1.5" fill="white" class="twinkle2"/>
  <circle cx="360" cy="30" r="1" fill="white" class="twinkle3"/>
  <circle cx="380" cy="80" r="1.5" fill="white" class="twinkle"/>
  <circle cx="20" cy="300" r="1" fill="white" class="twinkle2"/>
  <circle cx="370" cy="350" r="1.5" fill="white" class="twinkle3"/>
  <circle cx="50" cy="370" r="1" fill="white" class="twinkle"/>
  <circle cx="340" cy="15" r="1" fill="white" class="twinkle2"/>
  <circle cx="10" cy="150" r="1.5" fill="white" class="twinkle3"/>
  <circle cx="390" cy="200" r="1" fill="white" class="twinkle"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="170" fill="url(#glowGrad)" filter="url(#softglow)"/>

  <!-- Outer orbit ring -->
  <ellipse cx="200" cy="200" rx="185" ry="185" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.2" stroke-dasharray="4,8"/>

  <!-- Globe base -->
  <g class="float">
    <!-- Globe sphere -->
    <circle cx="200" cy="200" r="155" fill="url(#globeGrad)"/>

    <!-- Spinning content (latitude/longitude lines + continents) -->
    <g clip-path="url(#globeClip)">
      <g class="spin">
        <!-- Longitude lines -->
        <ellipse cx="200" cy="200" rx="155" ry="155" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
        <ellipse cx="200" cy="200" rx="100" ry="155" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
        <ellipse cx="200" cy="200" rx="45" ry="155" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.12"/>
        <ellipse cx="200" cy="200" rx="130" ry="155" fill="none" stroke="#00D9FF" stroke-width="0.4" stroke-opacity="0.1"/>
        <ellipse cx="200" cy="200" rx="70" ry="155" fill="none" stroke="#00D9FF" stroke-width="0.4" stroke-opacity="0.1"/>

        <!-- Latitude lines -->
        <ellipse cx="200" cy="200" rx="155" ry="40" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
        <ellipse cx="200" cy="200" rx="155" ry="80" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
        <ellipse cx="200" cy="200" rx="155" ry="120" fill="none" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.12"/>

        <!-- Equator highlighted -->
        <ellipse cx="200" cy="200" rx="155" ry="10" fill="none" stroke="#00D9FF" stroke-width="1" stroke-opacity="0.3"/>

        <!-- Continent shapes (simplified) -->
        <!-- North America -->
        <path d="M 120 130 Q 140 120 160 125 Q 175 135 170 155 Q 165 175 155 185 Q 145 195 130 190 Q 115 180 110 165 Q 105 150 120 130Z" fill="#00D9FF" fill-opacity="0.25" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.5"/>

        <!-- South America -->
        <path d="M 150 210 Q 165 205 175 215 Q 185 230 180 255 Q 175 270 165 275 Q 150 275 142 260 Q 135 245 138 230 Q 140 215 150 210Z" fill="#00D9FF" fill-opacity="0.2" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.45"/>

        <!-- Europe -->
        <path d="M 210 125 Q 225 118 240 122 Q 252 130 248 145 Q 243 158 230 162 Q 215 163 207 153 Q 200 142 210 125Z" fill="#00D9FF" fill-opacity="0.22" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.5"/>

        <!-- Africa -->
        <path d="M 215 170 Q 235 165 248 178 Q 260 195 258 220 Q 255 245 240 258 Q 222 265 208 255 Q 195 242 193 220 Q 190 195 202 180 Q 208 172 215 170Z" fill="#00D9FF" fill-opacity="0.22" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.45"/>

        <!-- Asia -->
        <path d="M 255 115 Q 290 108 315 118 Q 335 130 330 155 Q 325 175 305 182 Q 285 188 265 180 Q 248 170 245 150 Q 242 130 255 115Z" fill="#00D9FF" fill-opacity="0.25" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.5"/>

        <!-- Australia -->
        <path d="M 300 220 Q 318 215 330 225 Q 340 238 336 255 Q 330 268 315 270 Q 298 268 290 255 Q 283 240 290 228 Q 293 221 300 220Z" fill="#00D9FF" fill-opacity="0.2" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.45"/>

        <!-- Visitor dots (pulsing cities) -->
        <!-- Toronto -->
        <circle cx="148" cy="148" r="4" fill="#ff6b6b" filter="url(#glow)" class="pulse"/>
        <!-- London -->
        <circle cx="220" cy="132" r="4" fill="#00D9FF" filter="url(#glow)" class="pulse2"/>
        <!-- Tokyo -->
        <circle cx="318" cy="148" r="4" fill="#00ff88" filter="url(#glow)" class="pulse3"/>
        <!-- Sydney -->
        <circle cx="322" cy="242" r="3.5" fill="#ffd93d" filter="url(#glow)" class="pulse"/>
        <!-- Sao Paulo -->
        <circle cx="168" cy="248" r="3.5" fill="#ff6b6b" filter="url(#glow)" class="pulse2"/>
        <!-- Mumbai -->
        <circle cx="272" cy="178" r="3.5" fill="#00ff88" filter="url(#glow)" class="pulse3"/>

        <!-- Connection lines between cities -->
        <line x1="148" y1="148" x2="220" y2="132" stroke="#00D9FF" stroke-width="0.6" stroke-opacity="0.3" stroke-dasharray="3,4"/>
        <line x1="220" y1="132" x2="318" y2="148" stroke="#00D9FF" stroke-width="0.6" stroke-opacity="0.3" stroke-dasharray="3,4"/>
        <line x1="148" y1="148" x2="168" y2="248" stroke="#ff6b6b" stroke-width="0.6" stroke-opacity="0.3" stroke-dasharray="3,4"/>
        <line x1="318" y1="148" x2="322" y2="242" stroke="#00ff88" stroke-width="0.6" stroke-opacity="0.3" stroke-dasharray="3,4"/>
      </g>
    </g>

    <!-- Shine overlay -->
    <circle cx="200" cy="200" r="155" fill="url(#shineGrad)"/>
    <circle cx="200" cy="200" r="155" fill="url(#shadowGrad)"/>

    <!-- Globe border glow -->
    <circle cx="200" cy="200" r="155" fill="none" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.4" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="153" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
  </g>

  <!-- Orbiting satellite dot 1 -->
  <g class="orbit1">
    <circle cx="200" cy="200" r="5" fill="#00D9FF" filter="url(#glow)"/>
    <circle cx="200" cy="200" r="10" fill="none" stroke="#00D9FF" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Orbiting satellite dot 2 -->
  <g class="orbit2">
    <circle cx="200" cy="200" r="4" fill="#ff6b6b" filter="url(#glow)"/>
  </g>

  <!-- Outer ring spinning -->
  <g class="spin-rev">
    <ellipse cx="200" cy="200" rx="178" ry="50" fill="none" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="6,12"/>
  </g>

  <!-- Bottom shadow -->
  <ellipse cx="200" cy="375" rx="120" ry="12" fill="#00D9FF" fill-opacity="0.06"/>

  <!-- Title text -->
  <text x="200" y="24" text-anchor="middle" font-family="monospace" font-size="11" fill="#00D9FF" fill-opacity="0.8" letter-spacing="3">VISITOR GLOBE</text>
  <text x="200" y="390" text-anchor="middle" font-family="monospace" font-size="9" fill="#00D9FF" fill-opacity="0.5" letter-spacing="2">github.com/parthk1611</text>
</svg>
